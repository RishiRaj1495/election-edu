[build]
  publish = "."
  command = "echo 'Static site — no build step required'"

# ── Global Security Headers ────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://translate.google.com https://translate.googleapis.com https://www.gstatic.com https://www.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://translate.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://api.anthropic.com https://www.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net https://firestore.googleapis.com https://*.firebaseio.com https://firebaseinstallations.googleapis.com; img-src 'self' data: https: blob:; frame-src https://translate.google.com https://www.google.com https://www.googletagmanager.com; worker-src 'self';"

# ── Cache: Never cache Service Worker ─────────────────────────
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# ── Cache: PWA manifest ────────────────────────────────────────
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Cache: HTML pages ─────────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# ── Cache: Static assets (immutable) ──────────────────────────
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache: Sitemap & robots ────────────────────────────────────
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/xml"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Redirects ─────────────────────────────────────────────────
[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/test"
  to = "/tests.html"
  status = 301

# ── SPA Fallback ──────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
